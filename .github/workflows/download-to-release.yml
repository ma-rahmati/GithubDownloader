name: Download via GitHub (By AMiN)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated URLs'
        required: true
      split_mb:
        description: 'Split size in MB (max 1900 recommended)'
        required: false
        default: '1900'
      release_name:
        description: 'Custom release name (optional)'
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y aria2 zip

      - name: Download files
        run: |
          mkdir -p files
          URLS="${{ github.event.inputs.urls }}"

          for URL in $URLS; do
            NAME=$(basename "$URL")
            echo "Downloading $NAME"

            aria2c \
              --dir=files \
              --out="$NAME" \
              --split=4 \
              --max-connection-per-server=4 \
              --continue=true \
              "$URL"
          done

      - name: Create ZIP (split mode)
        run: |
          mkdir -p output
          SPLIT_MB=${{ github.event.inputs.split_mb }}

          for FILE in files/*; do
            [ -f "$FILE" ] || continue

            NAME=$(basename "$FILE")
            ZIP_NAME="output/${NAME}.zip"

            echo "Zipping + splitting: $NAME"

            zip -0 -s "${SPLIT_MB}m" "$ZIP_NAME" "$FILE"
          done
      
      - name: Get release name
        id: get_name
        run: |
          FILE=$(ls output | head -n 1)
          echo "name=$FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release + Upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: ${{ github.event.inputs.release_name || steps.get_name.outputs.name }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload files to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
